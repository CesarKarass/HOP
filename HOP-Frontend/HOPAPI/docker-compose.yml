version: '3.8'

services:
  backend:
    build: ./HOPAPI
    container_name: hop-backend
    restart: always
    ports:
      - "5147:5147"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5147
    volumes:
      - ./HOPAPI/uploads:/app/uploads
      - ./HOPAPI/wwwroot:/app/wwwroot
    networks:
      - hop-network

  frontend:
    build: ./HOPFROND
    container_name: hop-frontend
    restart: always
    ports:
      - "80:3000"
    environment:
      - API_URL=http://backend:5147
    depends_on:
      - backend
    networks:
      - hop-network

networks:
  hop-network:
    driver: bridge