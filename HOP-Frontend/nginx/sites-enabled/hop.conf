# Redirigir HTTP a HTTPS
server {
    listen 80;
    server_name hop.uadeo.online api.hop.uadeo.online;
    
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# FRONTEND - hop.uadeo.online
server {
    listen 443 ssl http2;
    server_name hop.uadeo.online;

    ssl_certificate /etc/letsencrypt/live/hop.uadeo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hop.uadeo.online/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para el API
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Archivos estáticos
    location /static/ {
        proxy_pass http://frontend:3000/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# BACKEND API - api.hop.uadeo.online
server {
    listen 443 ssl http2;
    server_name api.hop.uadeo.online;

    ssl_certificate /etc/letsencrypt/live/api.hop.uadeo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hop.uadeo.online/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}