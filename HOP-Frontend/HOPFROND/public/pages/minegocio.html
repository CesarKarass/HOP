<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Negocio - HOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --azul-oscuro: #001F3F;
            --naranja-hop: #fb8c00;
        }
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 1.5rem;
            color: white;
            text-shadow: 0 2px 4px rgb(0,0,0,0.5);
            text-decoration: none;
            z-index: 20;
        }
        .home-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            background: white;
            padding: 8px 15px;
            border-radius: 50px;
            box-shadow: 0 4px 12px rgb(0,0,0,0.15);
            z-index: 20;
            transition: 0.3s;
        }
        .home-btn:hover {
            transform: scale(1.05);
        }
        .home-btn img {
            height: 30px;
            width: 30px;
            border-radius: 50%;
            object-fit: cover;
        }
        .biz-banner {
            width: 100%;
            height: 350px;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1497366811353-687f2c5b1ab2?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            margin-bottom: -60px;
        }
        .upload-banner-btn {
            position: absolute;
            bottom: 80px;
            right: 30px;
            background: rgb(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid white;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-banner-btn:hover {
            background: white;
            color: var(--azul-oscuro);
        }
        .panel-title {
            font-weight: 800;
            font-size: 3.5rem;
            text-shadow: 0 4px 10px rgb(0,0,0,0.3);
            margin: 0;
        }
        .panel-subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .main-container {
            margin-bottom: 60px;
            position: relative;
            z-index: 5;
        }
        .biz-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgb(0,0,0,0.08);
            border-top: 6px solid var(--naranja-hop);
            margin-bottom: 30px;
        }
        .stat-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 20px rgb(0,0,0,0.06);
            border-bottom: 5px solid #eee;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--azul-oscuro);
        }
        .btn-edit-biz {
            background-color: transparent;
            color: var(--naranja-hop);
            border: 2px solid var(--naranja-hop);
            padding: 10px 25px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-edit-biz:hover {
            background-color: var(--naranja-hop);
            color: white;
        }
        .btn-post {
            background-color: var(--azul-oscuro);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgb(0, 31, 63, 0.2);
        }
        .btn-post:hover {
            background-color: #002d5c;
            transform: translateY(-3px);
        }
        #file-banner {
            display: none;
        }
        .promo-card {
            background: linear-gradient(135deg, var(--azul-oscuro) 0%, #002d5c 100%);
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            color: white;
        }
        .promo-header h1 {
            font-size: 3rem;
        }
        .btn-register-biz {
            background-color: var(--naranja-hop);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
            border: none;
        }
        .btn-register-biz:hover {
            background-color: #e67e00;
            transform: translateY(-2px);
            color: white;
        }
        .servicio-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--naranja-hop);
        }
        .servicio-titulo {
            font-weight: bold;
            color: var(--azul-oscuro);
        }
        .mensaje-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #1976d2;
        }
        .calificacion-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #ffc107;
        }
        .stars {
            color: #ffc107;
        }
        .loading-spinner {
            text-align: center;
            padding: 50px;
        }
        .sin-servicios {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        .btn-responder {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .btn-responder:hover {
            background-color: #0d47a1;
        }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="back-btn">←</a>
    <a href="/" class="home-btn">
        <span>Volver a HOP</span>
        <img src="http://localhost:5147/static/images/logohop.jpeg" alt="Logo HOP">
    </a>

    <div id="contenidoDinamico">
        <div class="container" style="margin-top: 150px;">
            <div class="promo-card">
                <div class="promo-header">
                    <h1 class="display-3 fw-bold">¿Tienes un negocio?</h1>
                    <p class="lead">Haz que tu empresa crezca encontrando el talento ideal en HOP.</p>
                    <a href="/registro_empresa" class="btn-register-biz shadow mt-4">Registrar mi Negocio Ahora</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:5147/api';
        
        const sesionActiva = localStorage.getItem('hop_session') === 'active';
        const usuarioActual = JSON.parse(localStorage.getItem('hop_usuario') || 'null');

        if (!sesionActiva || !usuarioActual) {
            window.location.href = '/login';
        }

        let mensajesRecibidos = [];
        let calificacionesRecibidas = [];

        async function cargarMisServicios() {
            try {
                const response = await fetch(`${API_BASE}/Servicios/buscar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Busqueda: null, CategoriaId: null })
                });
                
                if (!response.ok) throw new Error('Error al cargar servicios');
                
                const todosServicios = await response.json();
                const misServicios = todosServicios.filter(s => 
                    s.autor === usuarioActual.nombre || 
                    s.autor === usuarioActual.nombreCompleto
                );
                
                // Cargar mensajes y calificaciones
                await Promise.all([
                    cargarMensajesRecibidos(),
                    cargarCalificacionesRecibidas()
                ]);
                
                if (misServicios && misServicios.length > 0) {
                    mostrarPanelConServicios(misServicios);
                } else {
                    mostrarPanelSinServicios();
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarPanelSinServicios();
            }
        }

        async function cargarMensajesRecibidos() {
            try {
                const response = await fetch(`${API_BASE}/Chat/mensajes-recibidos/${usuarioActual.id}`);
                if (response.ok) {
                    mensajesRecibidos = await response.json();
                }
            } catch (error) {
                console.error('Error cargando mensajes:', error);
                mensajesRecibidos = [];
            }
        }

        async function cargarCalificacionesRecibidas() {
            try {
                const response = await fetch(`${API_BASE}/Calificaciones/mis-calificaciones/${usuarioActual.id}`);
                if (response.ok) {
                    calificacionesRecibidas = await response.json();
                }
            } catch (error) {
                console.error('Error cargando calificaciones:', error);
                calificacionesRecibidas = [];
            }
        }

        async function enviarRespuestaMensaje(emisorId, emisorNombre) {
            const mensaje = prompt(`Responder a ${emisorNombre}:`);
            if (!mensaje || !mensaje.trim()) return;
            
            try {
                const formData = new URLSearchParams();
                formData.append('emisorId', usuarioActual.id);
                formData.append('receptorId', emisorId);
                formData.append('mensaje', mensaje);
                
                const response = await fetch(`${API_BASE}/Chat/enviar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                
                if (response.ok) {
                    alert('✅ Mensaje enviado correctamente');
                } else {
                    throw new Error('Error al enviar');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error al enviar el mensaje');
            }
        }

        function mostrarPanelConServicios(servicios) {
            const datosEmpresa = {
                nombre_comercial: usuarioActual.nombreCompleto || usuarioActual.nombre || "Mi Negocio",
                razon_social: usuarioActual.nombreCompleto || usuarioActual.nombre || "Mi Negocio",
                rfc: "PENDIENTE",
                sector: "Servicios Generales",
                localidad: "Los Mochis, Sinaloa",
                responsable: usuarioActual.nombreCompleto || usuarioActual.nombre,
                email: usuarioActual.email || "correo@ejemplo.com",
                telefono: "(668) 000-0000",
                vacantes_est: servicios.length,
                empleados: 1
            };

            // Calcular promedio de calificaciones
            let promedioCalificaciones = 0;
            if (calificacionesRecibidas.length > 0) {
                const suma = calificacionesRecibidas.reduce((acc, c) => acc + c.puntuacion, 0);
                promedioCalificaciones = (suma / calificacionesRecibidas.length).toFixed(1);
            }

            let serviciosHtml = '';
            servicios.forEach(servicio => {
                serviciosHtml += `
                    <div class="servicio-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="servicio-titulo">${escapeHtml(servicio.titulo)}</div>
                                <small class="text-muted">${escapeHtml(servicio.categoria)} • ${escapeHtml(servicio.ubicacion)}</small>
                                <p class="small mt-2 mb-0">${escapeHtml(servicio.descripcion ? servicio.descripcion.substring(0, 80) : 'Sin descripción')}</p>
                            </div>
                            <div>
                                <span class="badge bg-success">Activo</span>
                            </div>
                        </div>
                        <hr class="my-2">
                        <div class="d-flex gap-2">
                            <small class="text-muted">Publicado: ${new Date(servicio.fechaRegistro).toLocaleDateString()}</small>
                            <a href="/negocio/${servicio.id}" class="small text-primary">Ver detalles →</a>
                        </div>
                    </div>
                `;
            });

            let mensajesHtml = '';
            if (mensajesRecibidos.length > 0) {
                mensajesHtml = mensajesRecibidos.slice(0, 5).map(m => `
                    <div class="mensaje-item">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <strong><i class="bi bi-person-circle"></i> ${escapeHtml(m.emisorNombre)}</strong>
                                <p class="small mb-1">${escapeHtml(m.mensaje)}</p>
                                <small class="text-muted">${new Date(m.fechaEnvio).toLocaleString()}</small>
                            </div>
                            <button class="btn-responder" onclick="enviarRespuestaMensaje(${m.emisorId}, '${escapeHtml(m.emisorNombre)}')">
                                <i class="bi bi-reply"></i> Responder
                            </button>
                        </div>
                    </div>
                `).join('');
            } else {
                mensajesHtml = '<p class="text-muted text-center py-3">No tienes mensajes recibidos</p>';
            }

            let calificacionesHtml = '';
            if (calificacionesRecibidas.length > 0) {
                calificacionesHtml = calificacionesRecibidas.slice(0, 5).map(c => `
                    <div class="calificacion-item">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="stars">
                                    ${'★'.repeat(c.puntuacion)}${'☆'.repeat(5 - c.puntuacion)}
                                </div>
                                <p class="small mb-1">${escapeHtml(c.comentario || 'Sin comentario')}</p>
                                <small class="text-muted">De: ${escapeHtml(c.calificadorNombre)} • ${new Date(c.fecha).toLocaleDateString()}</small>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                calificacionesHtml += `
                    <div class="mt-3 text-center">
                        <span class="badge bg-info">Promedio: ${promedioCalificaciones} ⭐ (${calificacionesRecibidas.length} calificaciones)</span>
                    </div>
                `;
            } else {
                calificacionesHtml = '<p class="text-muted text-center py-3">Aún no tienes calificaciones</p>';
            }

            const contenido = `
                <div class="biz-banner" id="banner-container">
                    <h1 class="panel-title">Panel de ${datosEmpresa.nombre_comercial}</h1>
                    <p class="panel-subtitle">Sede Los Mochis, Sinaloa</p>
                    <button class="upload-banner-btn" onclick="document.getElementById('file-banner').click()">
                        Cambiar Portada
                    </button>
                    <input type="file" id="file-banner" accept="image/*" onchange="updateBanner(event)">
                </div>
                <div class="container main-container">
                    <div class="row g-5">
                        <div class="col-md-8">
                            <div class="biz-card">
                                <div class="d-flex justify-content-between align-items-center mb-5">
                                    <h3 class="fw-bold m-0">Información General</h3>
                                    <a href="/registro_empresa" class="btn-edit-biz">Editar Perfil</a>
                                </div>
                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <label class="text-muted small d-block mb-1">Razón Social</label>
                                        <span class="fs-5 fw-semibold">${escapeHtml(datosEmpresa.razon_social)}</span>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="text-muted small d-block mb-1">RFC</label>
                                        <span class="fs-5 fw-semibold">${escapeHtml(datosEmpresa.rfc)}</span>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="text-muted small d-block mb-1">Sector de Actividad</label>
                                        <div><span class="badge bg-primary px-3 py-2 fs-6">${escapeHtml(datosEmpresa.sector)}</span></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="text-muted small d-block mb-1">Ubicación</label>
                                        <span class="fs-5 fw-semibold">${escapeHtml(datosEmpresa.localidad)}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="biz-card">
                                <h4 class="fw-bold mb-4">Datos del Responsable</h4>
                                <div class="d-flex align-items-center p-3" style="background: #fcfcfc; border-radius: 15px;">
                                    <div class="me-4">
                                        <div style="width: 60px; height: 60px; background: var(--azul-oscuro); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.5rem;">
                                            ${escapeHtml(datosEmpresa.responsable.charAt(0))}
                                        </div>
                                    </div>
                                    <div>
                                        <h5 class="mb-1 fw-bold">${escapeHtml(datosEmpresa.responsable)}</h5>
                                        <p class="text-muted mb-0">${escapeHtml(datosEmpresa.email)} • ${escapeHtml(datosEmpresa.telefono)}</p>
                                    </div>
                                </div>
                            </div>
                            <div class="biz-card">
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <h4 class="fw-bold m-0"><i class="bi bi-briefcase"></i> Mis Servicios Publicados</h4>
                                    <a href="/registro_empresa" class="btn-edit-biz" style="padding: 5px 15px; font-size: 0.9rem;">+ Nuevo</a>
                                </div>
                                ${serviciosHtml || '<div class="sin-servicios">No tienes servicios publicados aún. <a href="/registro_empresa">Publica tu primer servicio</a></div>'}
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-box mb-4">
                                <div class="stat-number">${datosEmpresa.vacantes_est}</div>
                                <div class="text-muted fw-bold">Servicios Publicados</div>
                            </div>
                            <div class="stat-box mb-4" style="border-bottom-color: var(--naranja-hop);">
                                <div class="stat-number">${datosEmpresa.empleados}</div>
                                <div class="text-muted fw-bold">Colaboradores</div>
                            </div>
                            <button class="btn-post" onclick="window.location.href='/registro_empresa'">
                                + Publicar Nuevo Servicio
                            </button>
                        </div>
                    </div>
                    
                    <!-- Mensajes Recibidos -->
                    <div class="row mt-4">
                        <div class="col-md-6">
                            <div class="biz-card">
                                <h4 class="fw-bold mb-4"><i class="bi bi-chat-dots"></i> Mensajes Recibidos</h4>
                                ${mensajesHtml}
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="biz-card">
                                <h4 class="fw-bold mb-4"><i class="bi bi-star-fill"></i> Calificaciones Recibidas</h4>
                                ${calificacionesHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('contenidoDinamico').innerHTML = contenido;
        }

        function mostrarPanelSinServicios() {
            const contenido = `
                <div class="container" style="margin-top: 150px;">
                    <div class="promo-card">
                        <div class="promo-header">
                            <h1 class="display-3 fw-bold">¿Tienes un negocio?</h1>
                            <p class="lead">Haz que tu empresa crezca encontrando el talento ideal en HOP.</p>
                            <a href="/registro_empresa" class="btn-register-biz shadow mt-4">Registrar mi Negocio Ahora</a>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('contenidoDinamico').innerHTML = contenido;
        }

        function updateBanner(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function() {
                const bannerContainer = document.getElementById('banner-container');
                if (bannerContainer) {
                    bannerContainer.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.6)), url('${reader.result}')`;
                }
            }
            if(file) reader.readAsDataURL(file);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.enviarRespuestaMensaje = enviarRespuestaMensaje;
        
        cargarMisServicios();
    </script>
</body>
</html>
