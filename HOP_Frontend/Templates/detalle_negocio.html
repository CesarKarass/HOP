<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Negocio - HOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --azul-oscuro: #001F3F; 
            --naranja-hop: #fb8c00; 
        }
        body { 
            background-color: #f8f9fa; 
        }
        .nav-detail { 
            background: white; 
            border-bottom: 1px solid #ddd; 
            padding: 1rem; 
        }
        .business-header { 
            background: var(--azul-oscuro); 
            color: white; 
            padding: 60px 0; 
            text-align: center; 
            border-radius: 0 0 20px 20px; 
        }
        .action-card { 
            background: white; 
            border-radius: 15px; 
            padding: 30px; 
            margin-top: -40px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .btn-hop { 
            background-color: var(--azul-oscuro); 
            color: white; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        .btn-hop:hover { 
            background-color: #002d5c; 
            color: white; 
            transform: translateY(-2px); 
        }
        .btn-edit { 
            border: 2px solid var(--naranja-hop); 
            color: var(--azul-oscuro); 
            font-weight: bold; 
        }
        .btn-edit:hover { 
            background: #f0f7ff; 
        }
    </style>
</head>
<body>

    <nav class="nav-detail">
        <div class="container d-flex justify-content-between">
            <a href="javascript:history.back()" class="text-decoration-none text-dark fw-bold">←</a>
            <span class="badge bg-secondary">ID Negocio: {{ id }}</span>
        </div>
    </nav>

    <header class="business-header">
        <div class="container">
            <h1 class="display-4 fw-bold">Nombre del Negocio</h1>
            <p class="lead">Ubicación: Los Mochis, Sinaloa</p>
        </div>
    </header>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="action-card">
                    <h4 class="fw-bold mb-4">¿Qué deseas hacer?</h4>
                    <p class="text-muted">Información del negocio.</p>
                    
                    <div class="d-grid gap-3 mt-4">
                        <button class="btn btn-hop p-3">
                             Ver vacantes y postularme
                        </button>

                        <button class="btn btn-edit p-3">
                             Editar información del negocio
                        </button>

                        <a href="/registro_empresa" class="btn btn-light border p-3 text-dark">
                             Registrar un negocio
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
