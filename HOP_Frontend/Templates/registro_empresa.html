<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Empresa - HOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --naranja-hop: #fb8c00; 
            --azul-oscuro: #001F3F; 
        }
        body { 
            background-color: #f8f9fa; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px 0; 
        }
        .back-btn { 
            position: absolute; 
            top: 20px; 
            left: 30px; 
            font-size: 1.5rem; 
            color: #333; 
            text-decoration: none; 
            transition: 0.3s; }
        .company-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            max-width: 900px; 
            margin: auto; 
        }
        .form-title { 
            color: var(--naranja-hop); 
            font-weight: bold; 
            font-size: 1.8rem; 
            margin-bottom: 30px; }
        .form-control-custom { 
            border: 1px solid #d1d5db; 
            border-radius: 8px; 
            padding: 12px; 
            margin-bottom: 20px; 
            width: 100%; 
        }
        .btn-orange { 
            background-color: var(--naranja-hop); 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 8px; 
            font-weight: bold; 
            width: 100%; 
            max-width: 250px; 
        }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="back-btn">←</a>
    <div class="company-card">
        <h1 class="form-title">Registro de Empresa en HOP</h1>
        <form action="/registrar_negocio_proceso" method="POST">
            <div class="row">
                <div class="col-md-6">
                    <input type="text" name="responsable" class="form-control-custom" placeholder="Nombre y apellidos del responsable" required>
                    <input type="email" name="email" class="form-control-custom" placeholder="Correo electrónico de acceso" required>
                    <input type="text" name="nombre_comercial" class="form-control-custom" placeholder="Nombre comercial de la empresa" required>
                    <div class="row g-2">
                        <div class="col-4"><input type="text" class="form-control-custom" placeholder="México" readonly></div>
                        <div class="col-8"><input type="text" name="rfc" class="form-control-custom" placeholder="RFC de la empresa"></div>
                    </div>
                </div>
                <div class="col-md-6">
                    <input type="tel" name="telefono" class="form-control-custom" placeholder="Teléfono de contacto" required>
                    <input type="password" name="password" class="form-control-custom" placeholder="Crea una contraseña" required>
                    <input type="text" name="razon_social" class="form-control-custom" placeholder="Razón social" required>
                    <select class="form-control-custom" name="localidad" required>
                        <option value="" disabled selected>Selecciona tu localidad</option>
                        <option value="Sector Centro">Sector Centro</option>
                        <option value="Colonia Scally">Colonia Scally</option>
                        <option value="Los Viñedos">Los Viñedos</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <select class="form-control-custom" name="sector" required>
                        <option value="" disabled selected>Sector</option>
                        <option value="Primario">Primario</option>
                        <option value="Secundario">Secundario</option>
                        <option value="Terciario">Terciario</option>
                    </select>
                </div>
                <div class="col-md-4"><input type="number" name="empleados" class="form-control-custom" placeholder="Empleados (1-20)" required></div>
                <div class="col-md-4">
                    <select class="form-control-custom" name="vacantes_est">
                        <option value="" disabled selected>Vacantes anuales</option>
                        <option value="1-5">1-5</option>
                        <option value="6-20">6-20</option>
                    </select>
                </div>
            </div>
            <div class="text-center mt-4"><button type="submit" class="btn-orange">Registrar mi Empresa</button></div>
        </form>
    </div>
</body>
</html>
