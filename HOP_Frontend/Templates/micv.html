<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sube tu CV - HOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f8f9fa; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; }
        
        .back-btn { 
            position: absolute; 
            top: 20px; 
            left: 30px; 
            font-size: 1.5rem; 
            color: #333; 
            text-decoration: none; 
        }
        
        .upload-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        .upload-title { 
            color: #001F3F; 
            font-weight: bold; 
            font-size: 2.5rem; 
            margin-bottom: 30px; 
        }

        .drop-zone {
            border: 2px dashed #d1d5db;
            border-radius: 10px;
            padding: 40px 20px;
            transition: 0.3s;
            cursor: pointer;
        }
        .drop-zone:hover { 
            border-color: #001F3F; 
            background-color: #f0f7ff; 
        }

        .icon-upload { 
            font-size: 2rem; 
            color: #6b7280; 
            margin-bottom: 15px; 
        }
        .text-instruction { 
            font-weight: 600; 
            color: #111827; 
        }
        .text-specs { 
            color: #6b7280; 
            font-size: 0.85rem; 
            margin-top: 5px; 
        }

        .btn-select {
            margin-top: 25px;
            background-color: #eff6ff;
            color: #2563eb;
            border: none;
            padding: 10px 40px;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.3s;
        }
        .btn-select:hover { 
            background-color: #dbeafe; 
        }
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="back-btn">←</a>

    <div class="upload-card">
        <h1 class="upload-title">Sube tu CV</h1>
        
        <form action="#" method="POST" enctype="multipart/form-data">
            <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                <div class="icon-upload">📤</div>
                <p class="text-instruction">Elige un archivo</p>
                <p class="text-specs">Debe ser en formato PDF o DOCX y pesar máximo 8 MB.</p>
                
                <input type="file" id="fileInput" name="curriculum" style="display: none;" accept=".pdf,.docx">
                
                <button type="button" class="btn-select">Seleccionar</button>
            </div>
        </form>
    </div>

    <script>
        // Muestra un mensaje cuando el usuario selecciona un archivo
        document.getElementById('fileInput').addEventListener('change', function() {
            if(this.files.length > 0) {
                alert("Archivo seleccionado: " + this.files[0].name);
            }
        });
    </script>

</body>
</html>
